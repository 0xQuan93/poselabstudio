[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  # Use esbuild for TypeScript functions
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    # Security: Allow Discord and Localhost to embed this app (replaces X-Frame-Options)
    Content-Security-Policy = "frame-ancestors 'self' https://*.discord.com https://discord.com https://localhost:* http://localhost:*;"
    
    # Standard Security Headers
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=*, microphone=*, clipboard-write=*"

# Headers removed to fix resource blocking
# [[headers]]
#   for = "/*"
#   [headers.values]
#     Cross-Origin-Opener-Policy = "same-origin"
#     Cross-Origin-Embedder-Policy = "require-corp"

[[redirects]]
  from = "/api/auth/discord"
  to = "/.netlify/functions/auth-discord"
  status = 200

[[redirects]]
  from = "/api/auth/callback"
  to = "/.netlify/functions/auth-callback"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
